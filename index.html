<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球金融看板 - 新闻与行情</title>
<style>
/* ========== Reset & Base ========== */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Roboto,sans-serif;background:#0a0e17;color:#d1d4dc;font-size:14px;line-height:1.6;overflow-x:hidden}
a{color:#2962ff;text-decoration:none}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:#131722}
::-webkit-scrollbar-thumb{background:#2a2e39;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#3a3e49}

/* ========== Header ========== */
.header{position:fixed;top:0;left:0;right:0;height:56px;background:#0d1117;border-bottom:1px solid #1e2530;z-index:100;display:flex;align-items:center;padding:0 24px;justify-content:space-between}
.header-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;color:#fff}
.header-logo .dot{width:10px;height:10px;border-radius:50%;background:#26a69a;box-shadow:0 0 8px #26a69a;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.header-nav{display:flex;gap:4px}
.nav-tab{padding:8px 20px;border-radius:6px;cursor:pointer;color:#787b86;font-size:14px;font-weight:500;transition:all .2s;border:none;background:none}
.nav-tab:hover{color:#d1d4dc;background:#1c2030}
.nav-tab.active{color:#fff;background:#1e2530}
.header-time{color:#787b86;font-size:12px;display:flex;align-items:center;gap:12px}
.refresh-btn{padding:6px 16px;border-radius:6px;cursor:pointer;color:#26a69a;font-size:13px;font-weight:600;transition:all .2s;border:1px solid rgba(38,166,154,.3);background:rgba(38,166,154,.1);display:flex;align-items:center;gap:6px}
.refresh-btn:hover{background:rgba(38,166,154,.2);border-color:#26a69a;transform:translateY(-1px)}
.refresh-btn:active{transform:translateY(0)}
.refresh-btn.spinning .refresh-icon{animation:spin .8s linear infinite}
.refresh-icon{display:inline-block;font-size:15px}

/* ========== Main ========== */
.main{margin-top:56px;padding:20px 24px;max-width:1600px;margin-left:auto;margin-right:auto}
.section{display:none}
.section.active{display:block}

/* ========== News Section ========== */
.news-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.region-tabs{display:flex;gap:4px;flex-wrap:wrap}
.region-tab{padding:6px 16px;border-radius:20px;cursor:pointer;color:#787b86;font-size:13px;font-weight:500;transition:all .2s;border:1px solid #2a2e39;background:#131722}
.region-tab:hover{color:#d1d4dc;border-color:#3a3e49}
.region-tab.active{color:#fff;border-color:#2962ff;background:rgba(41,98,255,.15)}
.news-meta{font-size:12px;color:#787b86}
.news-meta span{color:#2962ff;font-weight:600}

.region-summary{background:linear-gradient(135deg,#131722 0%,#0f1320 100%);border:1px solid #1e2530;border-radius:12px;padding:20px 24px;margin-bottom:20px}
.region-summary h3{font-size:16px;margin-bottom:8px;color:#fff}
.region-summary .predictions{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.pred-badge{padding:3px 12px;border-radius:12px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.pred-bullish{background:rgba(38,166,154,.15);color:#26a69a;border:1px solid rgba(38,166,154,.3)}
.pred-bearish{background:rgba(239,83,80,.15);color:#ef5350;border:1px solid rgba(239,83,80,.3)}
.pred-neutral{background:rgba(255,193,7,.15);color:#ffc107;border:1px solid rgba(255,193,7,.3)}

.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:16px}
.news-card{background:#131722;border:1px solid #1e2530;border-radius:10px;padding:18px;transition:all .2s;position:relative;overflow:hidden}
.news-card:hover{border-color:#2a3a4e;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.news-card::before{content:'';position:absolute;left:0;top:0;width:4px;height:100%}
.news-card.bullish::before{background:#26a69a}
.news-card.bearish::before{background:#ef5350}
.news-card.neutral::before{background:#ffc107}
.news-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
.news-card-title{font-size:15px;font-weight:600;color:#fff;line-height:1.4;flex:1}
.news-card-pred{padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
.news-card .pred-bullish{background:rgba(38,166,154,.2);color:#26a69a}
.news-card .pred-bearish{background:rgba(239,83,80,.2);color:#ef5350}
.news-card .pred-neutral{background:rgba(255,193,7,.2);color:#ffc107}
.news-card-meta{display:flex;gap:8px;font-size:12px;color:#787b86;margin-bottom:8px}
.news-card-meta .source{color:#5d9cec}
.news-card-summary{font-size:13px;color:#b2b5bc;line-height:1.5;margin-bottom:10px}
.news-card-sectors{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.sector-tag{padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(124,58,237,.15);color:#a78bfa;border:1px solid rgba(124,58,237,.2)}
.news-card-indices{font-size:12px;color:#787b86;margin-bottom:8px}
.news-card-indices strong{color:#5d9cec}
.news-card-analysis{font-size:12px;color:#9ca3af;line-height:1.5;background:rgba(255,255,255,.03);border-radius:6px;padding:8px 10px;border-left:2px solid #2962ff}
.news-card-analysis strong{color:#e0e3eb}

/* ========== Stock Section ========== */
.stock-search-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-input-wrap{position:relative;flex:1;min-width:300px;max-width:500px}
.search-input{width:100%;padding:10px 16px 10px 40px;border-radius:8px;border:1px solid #2a2e39;background:#131722;color:#d1d4dc;font-size:14px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:#2962ff}
.search-input::placeholder{color:#5a5d66}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#787b86;font-size:16px}
.market-toggle{display:flex;border:1px solid #2a2e39;border-radius:8px;overflow:hidden}
.market-btn{padding:8px 16px;cursor:pointer;color:#787b86;font-size:13px;font-weight:500;background:#131722;border:none;transition:all .2s}
.market-btn.active{color:#fff;background:#1e2530}
.market-btn:hover:not(.active){color:#d1d4dc}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#171b26;border:1px solid #2a2e39;border-radius:8px;max-height:320px;overflow-y:auto;z-index:50;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.search-results.show{display:block}
.search-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #1e2530;transition:background .15s}
.search-item:hover{background:#1c2030}
.search-item:last-child{border-bottom:none}
.search-item-code{font-size:12px;color:#787b86}
.search-item-name{font-size:14px;color:#d1d4dc;margin-top:2px}
.search-item-market{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;margin-left:6px}
.market-sh{background:rgba(239,83,80,.15);color:#ef5350}
.market-sz{background:rgba(38,166,154,.15);color:#26a69a}
.market-us{background:rgba(41,98,255,.15);color:#5d9cec}

.stock-detail{background:#131722;border:1px solid #1e2530;border-radius:12px;padding:24px;margin-bottom:20px;display:none}
.stock-detail.show{display:block}
.stock-detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.stock-name-block{display:flex;align-items:center;gap:12px}
.stock-name{font-size:24px;font-weight:700;color:#fff}
.stock-code{font-size:14px;color:#787b86}
.stock-price-block{text-align:right}
.stock-price{font-size:36px;font-weight:700}
.stock-price.up{color:#26a69a}
.stock-price.down{color:#ef5350}
.stock-change{font-size:16px;font-weight:600;margin-top:4px}
.stock-change.up{color:#26a69a}
.stock-change.down{color:#ef5350}
.stock-change span{font-size:13px;opacity:.8;margin-left:4px}
.stock-metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.metric{background:rgba(255,255,255,.03);border-radius:8px;padding:12px;text-align:center}
.metric-label{font-size:11px;color:#787b86;margin-bottom:4px}
.metric-value{font-size:16px;font-weight:600;color:#d1d4dc}
.metric-value.up{color:#26a69a}
.metric-value.down{color:#ef5350}
.stock-actions{display:flex;gap:8px;margin-top:16px}
.btn{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
.btn-primary{background:#2962ff;color:#fff}
.btn-primary:hover{background:#1e54e7}
.btn-outline{background:none;border:1px solid #2a2e39;color:#d1d4dc}
.btn-outline:hover{border-color:#3a3e49}
.btn-danger{background:none;border:1px solid rgba(239,83,80,.3);color:#ef5350}
.btn-danger:hover{background:rgba(239,83,80,.1)}

.hot-stocks{margin-bottom:20px}
.hot-stocks h3{font-size:15px;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hot-stocks h3::before{content:'';width:3px;height:16px;background:#2962ff;border-radius:2px}
.hot-stocks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.hot-stock-chip{padding:8px 12px;border-radius:6px;border:1px solid #2a2e39;background:#131722;cursor:pointer;text-align:center;transition:all .15s}
.hot-stock-chip:hover{border-color:#2962ff;background:#171b26;transform:translateY(-1px)}
.hot-stock-chip .code{font-size:11px;color:#787b86}
.hot-stock-chip .name{font-size:13px;color:#d1d4dc;margin-top:2px}

.watchlist{background:#131722;border:1px solid #1e2530;border-radius:12px;padding:20px}
.watchlist h3{font-size:15px;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.watchlist h3::before{content:'';width:3px;height:16px;background:#ffc107;border-radius:2px}
.watchlist-items{display:flex;flex-wrap:wrap;gap:8px}
.watchlist-empty{color:#5a5d66;font-size:13px;text-align:center;padding:20px}
.watchlist-chip{padding:6px 14px;border-radius:6px;border:1px solid #2a2e39;background:#171b26;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;transition:all .15s}
.watchlist-chip:hover{border-color:#3a3e49}
.watchlist-chip .remove{color:#5a5d66;cursor:pointer;font-size:14px}
.watchlist-chip .remove:hover{color:#ef5350}

.loading{text-align:center;padding:40px;color:#787b86}
.loading .spinner{display:inline-block;width:28px;height:28px;border:3px solid #2a2e39;border-top-color:#2962ff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:20px;color:#ef5350;font-size:13px}

/* ========== Responsive ========== */
@media(max-width:768px){
  .header{padding:0 12px}
  .header-logo{font-size:15px}
  .header-time{display:none}
  .main{padding:12px}
  .news-grid{grid-template-columns:1fr}
  .stock-metrics{grid-template-columns:repeat(2,1fr)}
  .stock-name{font-size:20px}
  .stock-price{font-size:28px}
}

/* ========== Index Section ========== */
.index-overview{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.index-card{background:#131722;border:1px solid #1e2530;border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.index-card:hover{border-color:#2a3a4e;transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.index-card.region-china{border-top:3px solid #ef5350}
.index-card.region-us{border-top:3px solid #2962ff}
.index-card.region-asia{border-top:3px solid #ff9800}
.index-card.region-europe{border-top:3px solid #ab47bc}
.index-card.region-global{border-top:3px solid #26a69a}
.index-card .idx-name{font-size:13px;color:#787b86;margin-bottom:4px}
.index-card .idx-price{font-size:22px;font-weight:700;color:#fff;line-height:1.2}
.index-card .idx-change{font-size:13px;font-weight:600;margin-top:2px}
.index-card .idx-change.up{color:#26a69a}
.index-card .idx-change.down{color:#ef5350}
.index-card .idx-meta{display:flex;gap:10px;font-size:11px;color:#5a5d66;margin-top:8px;border-top:1px solid #1e2530;padding-top:6px}
.index-card .idx-risk{font-weight:600}
.index-card .idx-risk.high{color:#ef5350}
.index-card .idx-risk.medium{color:#ffc107}
.index-card .idx-risk.low{color:#26a69a}

.index-detail{background:#131722;border:1px solid #1e2530;border-radius:12px;padding:24px;margin-bottom:20px;display:none}
.index-detail.show{display:block}
.index-detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.index-detail-name{font-size:22px;font-weight:700;color:#fff}
.index-detail-code{font-size:13px;color:#787b86;margin-top:2px}
.index-detail-price-block{text-align:right}
.index-detail-price{font-size:32px;font-weight:700}
.index-detail-price.up{color:#26a69a}
.index-detail-price.down{color:#ef5350}
.index-detail-change{font-size:14px;font-weight:600;margin-top:4px}
.index-detail-change.up{color:#26a69a}
.index-detail-change.down{color:#ef5350}
.index-metrics-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.index-analysis-box{background:rgba(255,255,255,.03);border-radius:8px;padding:16px;border-left:3px solid #2962ff}
.index-analysis-box h4{font-size:14px;color:#fff;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.index-analysis-box h4 .risk-tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.index-analysis-box h4 .risk-tag.high{background:rgba(239,83,80,.2);color:#ef5350}
.index-analysis-box h4 .risk-tag.medium{background:rgba(255,193,7,.2);color:#ffc107}
.index-analysis-box h4 .risk-tag.low{background:rgba(38,166,154,.2);color:#26a69a}
.index-analysis-box p{font-size:13px;color:#9ca3af;line-height:1.6}
.index-analysis-box .factors{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.index-analysis-box .factor-chip{padding:2px 10px;border-radius:4px;font-size:11px;background:rgba(124,58,237,.12);color:#a78bfa;border:1px solid rgba(124,58,237,.2)}
.index-analysis-box .factor-chip.neg{background:rgba(239,83,80,.12);color:#ef5350;border-color:rgba(239,83,80,.2)}
.index-analysis-box .factor-chip.pos{background:rgba(38,166,154,.12);color:#26a69a;border-color:rgba(38,166,154,.2)}

.region-group{margin-bottom:24px}
.region-group h3{font-size:15px;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.region-group h3 .rg-dot{width:8px;height:8px;border-radius:50%}
.region-group h3 .rg-dot.china{background:#ef5350}
.region-group h3 .rg-dot.us{background:#2962ff}
.region-group h3 .rg-dot.asia{background:#ff9800}
.region-group h3 .rg-dot.europe{background:#ab47bc}
.region-group h3 .rg-dot.global{background:#26a69a}
.region-group h3 .rg-count{font-size:12px;color:#5a5d66;font-weight:400}
</style>
</head>
<body>

<!-- ========== Header ========== -->
<div class="header">
  <div class="header-logo">
    <span class="dot"></span>
    <span>全球金融看板</span>
  </div>
  <div class="header-nav">
    <button class="nav-tab active" data-section="news">新闻看板</button>
    <button class="nav-tab" data-section="index">全球指数</button>
    <button class="nav-tab" data-section="stock">股票行情</button>
  </div>
  <div class="header-time" id="headerTime">
    <button class="refresh-btn" id="refreshAllBtn" title="刷新所有板块数据">
      <span class="refresh-icon">⟳</span>刷新数据
    </button>
    <span id="clockText"></span>
  </div>
</div>

<!-- ========== Main ========== -->
<div class="main">

  <!-- ========== News Section ========== -->
  <div class="section active" id="newsSection">
    <div class="news-toolbar">
      <div class="region-tabs" id="regionTabs">
        <button class="region-tab active" data-region="global">全球</button>
        <button class="region-tab" data-region="us">美国</button>
        <button class="region-tab" data-region="asia">亚洲</button>
        <button class="region-tab" data-region="europe">欧洲</button>
        <button class="region-tab" data-region="china">中国</button>
      </div>
      <div class="news-meta">
        近7天新闻 · 筛选自<span id="newsCount">500+</span>条 · 精选<span>10</span>条/区域
      </div>
    </div>
    <div id="regionSummary"></div>
    <div class="news-grid" id="newsGrid"></div>
  </div>

  <!-- ========== Index Section ========== -->
  <div class="section" id="indexSection">
    <div class="news-toolbar">
      <div class="region-tabs" id="indexRegionTabs">
        <button class="region-tab active" data-iregion="all">全部</button>
        <button class="region-tab" data-iregion="china">中国</button>
        <button class="region-tab" data-iregion="us">美国</button>
        <button class="region-tab" data-iregion="asia">亚洲</button>
        <button class="region-tab" data-iregion="europe">欧洲</button>
        <button class="region-tab" data-iregion="global">全球宏观</button>
      </div>
      <div class="news-meta">
        <span id="indexRefreshLabel">实时行情</span> · 点击指数卡片查看<span>风险分析</span>
      </div>
    </div>
    <div id="indexOverview"></div>
    <div class="index-detail" id="indexDetail">
      <div id="indexDetailContent"></div>
    </div>
    <div id="indexGroups"></div>
  </div>

  <!-- ========== Stock Section ========== -->
  <div class="section" id="stockSection">
    <div class="stock-search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="stockSearch" placeholder="输入股票名称或代码（如 贵州茅台 / 600519 / AAPL）" autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>
      <div class="market-toggle" id="marketToggle">
        <button class="market-btn active" data-market="all">全部</button>
        <button class="market-btn" data-market="cn">A股</button>
        <button class="market-btn" data-market="us">美股</button>
      </div>
    </div>

    <div class="stock-detail" id="stockDetail">
      <div id="stockDetailContent"></div>
    </div>

    <div class="hot-stocks">
      <h3>A股热门</h3>
      <div class="hot-stocks-grid" id="hotStocksCN"></div>
    </div>
    <div class="hot-stocks">
      <h3>美股热门</h3>
      <div class="hot-stocks-grid" id="hotStocksUS"></div>
    </div>

    <div class="watchlist">
      <h3>自选列表</h3>
      <div class="watchlist-items" id="watchlist"></div>
    </div>
  </div>

</div>

<script>
// ==================== NEWS DATA ====================
const NEWS_DATA = {
  global: [
    { t:"美伊冲突升级：美军封锁伊朗全境港口及石油码头", s:"国际金融报", d:"2026-07-15", sum:"美军开始执行对所有伊朗港口及沿海地区的海上封锁，封锁适用于所有船舶，涵盖伊朗全境海岸线包括石油码头。霍尔木兹海峡非伊朗目的地不受影响。", sec:["能源","军工","航运","保险"], pre:"利空", det:"霍尔木兹海峡是全球石油运输咽喉，封锁将冲击全球约20%的石油海运量。预计布伦特原油短期上涨5-10%，避险资产黄金和美元走强，航运和保险费率上升。", idx:["布伦特原油","WTI原油","COMEX黄金","美元指数"] },

  // Region summary
  let bull = 0, bear = 0, neut = 0;
  news.forEach(n => { if(n.pre==='利多')bull++; else if(n.pre==='利空')bear++; else neut++; });

  summary.innerHTML = `

        <span class="pred-badge pred-neutral">中性 ${neut}条</span>
      </div>
    </div>
  `;

  // News cards
  grid.innerHTML = news.map(n => {
    const cls = n.pre === '利多' ? 'bullish' : n.pre === '利空' ? 'bearish' : 'neutral';

    <div class="news-card ${cls}">

        <span class="news-card-pred ${predCls}">${n.pre}</span>
      </div>
      <div class="news-card-meta">
        <span class="source">${n.s}</span>
        <span>${n.d}</span>

        <strong>逻辑分析：</strong>${n.det}
      </div>
    </div>
    `;
  }).join('');
}

// ========== API Proxy Config ==========
// 部署到 HTTPS 站点（如 GitHub Pages）时，需要 Cloudflare Worker 代理来访问东方财富 HTTP API
// 1. 将 worker.js 部署到 Cloudflare Workers
// 2. 将得到的 URL 填入下方（末尾不要加斜杠）
//    例如：API_PROXY = 'https://east-proxy.你的用户名.workers.dev'
// 3. 如果只是本地双击 HTML 使用（file:// 协议），保持为空即可
const API_PROXY = '';
// Note: HTTP URLs work on file:// protocol and via Cloudflare Worker proxy.
//       Direct HTTPS would fail on push2.eastmoney.com (server rejects TLS).
const API_HTTP = 'http';

// Fetch with optional proxy
async function fetchWithProxy(apiUrl) {
  if (API_PROXY) {
    // Proxy mode: HTTP API → Worker proxy → HTTPS → page
    const proxyUrl = API_PROXY + '?url=' + encodeURIComponent(apiUrl);
    const resp = await fetch(proxyUrl);
    if (!resp.ok) throw new Error('代理错误: ' + resp.status);
    return await resp.json();
  } else {
    // Direct JSONP mode (local file:// usage, no mixed-content restriction)
    return jsonp(apiUrl);
  }
}

// JSONP helper (for local file:// usage)
function jsonp(url, timeout) {
  timeout = timeout || 10000;
  return new Promise((resolve, reject) => {
    const cbName = '_jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    let script = null, tid = null;
    window[cbName] = function(data) {
      cleanup(); resolve(data);
    };
    function cleanup() {
      if(tid) clearTimeout(tid);
      if(script && script.parentNode) script.parentNode.removeChild(script);
      try { delete window[cbName]; } catch(e){ window[cbName]=undefined; }
    }
    tid = setTimeout(()=>{ cleanup(); reject(new Error('请求超时')); }, timeout);
    script = document.createElement('script');
    script.src = url + (url.includes('?')?'&':'?') + 'cb=' + cbName;
    script.onerror = ()=>{ cleanup(); reject(new Error('网络错误')); };
    document.body.appendChild(script);
  });
}

    if (currentMarket !== 'all') {
      items = items.filter(it => {
        const mkt = parseInt(it.MktNum || it.mktNum || 0);
        if (currentMarket === 'cn') return mkt === 0 || mkt === 1;
        if (currentMarket === 'us') return mkt === 105 || mkt === 106;
        return true;
      });
    }

    // Filter to stock types only
    items = items.filter(it => {
      const st = it.SecurityType || it.securityType || '';
      const code = it.Code || it.code || '';
      // Keep stocks (type 40 for A-shares, 80 for US), filters out bonds, funds
      if (st && (st.includes('40') || st.includes('80') || st.includes('30') || st.includes('60'))) return true;
      // Fallback: keep by market
      const mkt = parseInt(it.MktNum || 0);
      if (mkt === 0 || mkt === 1 || mkt === 105 || mkt === 106) return true;
      return false;
    });

    if (items.length === 0) {
      results.innerHTML = '<div style="padding:16px;text-align:center;color:#787b86;font-size:13px">未找到匹配的股票</div>';
      return;
    }

    results.innerHTML = items.map(it => {
      const code = it.Code || it.code || '';
      const name = it.Name || it.name || '';
      const mkt = parseInt(it.MktNum || it.mktNum || 0);
      let mktLabel = '', mktClass = '';
      if (mkt === 1) { mktLabel='SH'; mktClass='market-sh'; }
      else if (mkt === 0) { mktLabel='SZ'; mktClass='market-sz'; }
      else if (mkt === 105) { mktLabel='NASDAQ'; mktClass='market-us'; }
      else if (mkt === 106) { mktLabel='NYSE'; mktClass='market-us'; }
      else { mktLabel='MKT'+mkt; mktClass='market-us'; }
      return `<div class="search-item" onclick="selectStock('${code}',${mkt},'${name}')">
        <div class="search-item-code">${code} <span class="search-item-market ${mktClass}">${mktLabel}</span></div>
        <div class="search-item-name">${name}</div>
      </div>`;
    }).join('');
  } catch(err) {
    results.innerHTML = '<div class="error-msg">搜索失败：' + err.message + '<br>请检查网络连接</div>';
  }
}

// Select stock from search results
function selectStock(code, mkt, name) {
  document.getElementById('searchResults').classList.remove('show');
  document.getElementById('stockSearch').value = name + ' (' + code + ')';
  fetchStockQuote(code, mkt, name);
}

// Get East Money quote URL
function getQuoteUrl(code, mkt) {
  if (mkt === 1) return 'https://quote.eastmoney.com/sh' + code + '.html';
  if (mkt === 0) return 'https://quote.eastmoney.com/sz' + code + '.html';
  if (mkt === 105 || mkt === 106) return 'https://quote.eastmoney.com/us/' + code + '.html';
  return 'https://quote.eastmoney.com/';
}

// Fetch stock quote
async function fetchStockQuote(code, mkt, name) {
  const detail = document.getElementById('stockDetail');
  const content = document.getElementById('stockDetailContent');
  detail.classList.add('show');
  content.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px">正在获取 ' + name + ' 实时行情...</p></div>';

  const secid = mkt + '.' + code;
  currentStock = { code, mkt, name, secid };

  // Auto-refresh
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(()=>{ if(currentStock) fetchStockQuoteRaw(currentStock.code, currentStock.mkt, currentStock.name); }, 10000);

  await fetchStockQuoteRaw(code, mkt, name);
}

async function fetchStockQuoteRaw(code, mkt, name) {
  const content = document.getElementById('stockDetailContent');
  const secid = mkt + '.' + code;
  const fields = 'f43,f44,f45,f46,f47,f48,f50,f51,f52,f55,f57,f58,f60,f84,f85,f100,f116,f117,f161,f162,f163,f167,f168,f169,f170,f171,f177';
  const url = API_HTTP + '://push2.eastmoney.com/api/qt/stock/get?secid=' + secid + '&fields=' + fields;

  try {
    const data = await fetchWithProxy(url);
    if (!data || !data.data || data.rc !== 0) {
      content.innerHTML = '<div class="error-msg">无法获取该股票行情数据<br>可能是非交易时间或代码有误</div>';
      return;
    }
    const d = data.data;
    const isUS = (mkt === 105 || mkt === 106);
    // US stocks use /1000 precision, A-shares use /100
    const divisor = isUS ? 1000 : 100;

    const price = (d.f43 || 0) / divisor;
    const prevClose = (d.f60 || 0) / divisor;
    const high = (d.f44 || 0) / divisor;
    const low = (d.f45 || 0) / divisor;
    const open = (d.f46 || 0) / divisor;
    const change = (d.f169 || 0) / divisor;
    // Percent/ratio fields are returned *100 by eastmoney API, need /100
    const changePct = (d.f170 || 0) / 100;
    const volume = d.f47 || 0;
    const turnover = d.f48 || 0;
    const volumeRatio = (d.f50 || 0) / 100;
    const limitUp = (d.f51 || 0) / divisor;
    const limitDown = (d.f52 || 0) / divisor;
    const speed = (d.f55 || 0) / 100;
    const totalShares = d.f84 || 0;
    const floatShares = d.f85 || 0;
    const industry = d.f100 || '—';
    const totalMcap = d.f116 || 0;
    const floatMcap = d.f117 || 0;
    const peStatic = (d.f161 || 0) / 100;
    const peTtm = (d.f162 || 0) / 100;
    const peDynamic = (d.f163 || 0) / 100;
    const pb = (d.f167 || 0) / 100;
    const turnoverRate = (d.f168 || 0) / 100;
    const amplitude = (d.f171 || 0) / 100;
    const bidRatio = (d.f177 || 0) / 100;

    const isUp = change >= 0;
    const priceColor = isUp ? 'up' : 'down';
    const currency = isUS ? '$' : '¥';

    const fmtVol = (v) => {
      if (v >= 1e12) return (v/1e12).toFixed(2)+'万亿';
      if (v >= 1e8) return (v/1e8).toFixed(2)+'亿';
      if (v >= 1e4) return (v/1e4).toFixed(2)+'万';
      return v.toString();
    };
    const fmtMcap = (v) => {
      if (v >= 1e12) return (v/1e12).toFixed(2)+'万亿';
      if (v >= 1e8) return (v/1e8).toFixed(2)+'亿';
      if (v >= 1e4) return (v/1e4).toFixed(2)+'万';
      return v.toString();
    };

    const inWatchlist = isWatchlisted(code, mkt);

    content.innerHTML = `
      <div class="stock-detail-header">
        <div class="stock-name-block">
          <div>
            <div class="stock-name">${d.f58 || name}</div>
            <div class="stock-code">${code} · ${isUS ? (mkt===105?'NASDAQ':'NYSE') : (mkt===1?'上交所':'深交所')} · ${industry}</div>
          </div>
        </div>
        <div class="stock-price-block">
          <div class="stock-price ${priceColor}">${currency}${price.toFixed(2)}</div>
          <div class="stock-change ${priceColor}">
            ${isUp?'+':''}${change.toFixed(2)} <span>(${isUp?'+':''}${changePct.toFixed(2)}%)</span>
          </div>
        </div>
      </div>
      <div class="stock-metrics">
        <div class="metric"><div class="metric-label">开盘价</div><div class="metric-value">${currency}${open.toFixed(2)}</div></div>
        <div class="metric"><div class="metric-label">最高价</div><div class="metric-value up">${currency}${high.toFixed(2)}</div></div>
        <div class="metric"><div class="metric-label">最低价</div><div class="metric-value down">${currency}${low.toFixed(2)}</div></div>
        <div class="metric"><div class="metric-label">昨收价</div><div class="metric-value">${currency}${prevClose.toFixed(2)}</div></div>
        <div class="metric"><div class="metric-label">成交量</div><div class="metric-value">${fmtVol(volume)}</div></div>
        <div class="metric"><div class="metric-label">成交额</div><div class="metric-value">${fmtVol(turnover)}</div></div>
        <div class="metric"><div class="metric-label">换手率</div><div class="metric-value">${turnoverRate.toFixed(2)}%</div></div>
        <div class="metric"><div class="metric-label">量比</div><div class="metric-value">${volumeRatio.toFixed(2)}</div></div>
        <div class="metric"><div class="metric-label">市盈率(动)</div><div class="metric-value">${peDynamic?peDynamic.toFixed(2):'—'}</div></div>
        <div class="metric"><div class="metric-label">市盈率(TTM)</div><div class="metric-value">${peTtm?peTtm.toFixed(2):'—'}</div></div>
        <div class="metric"><div class="metric-label">市净率</div><div class="metric-value">${pb?pb.toFixed(2):'—'}</div></div>
        <div class="metric"><div class="metric-label">振幅</div><div class="metric-value">${amplitude.toFixed(2)}%</div></div>
        <div class="metric"><div class="metric-label">总市值</div><div class="metric-value">${fmtMcap(totalMcap)}</div></div>
        <div class="metric"><div class="metric-label">流通市值</div><div class="metric-value">${fmtMcap(floatMcap)}</div></div>
        ${!isUS ? `<div class="metric"><div class="metric-label">涨停价</div><div class="metric-value up">${currency}${limitUp.toFixed(2)}</div></div>
        <div class="metric"><div class="metric-label">跌停价</div><div class="metric-value down">${currency}${limitDown.toFixed(2)}</div></div>` : ''}
        <div class="metric"><div class="metric-label">涨速</div><div class="metric-value ${speed>=0?'up':'down'}">${speed>=0?'+':''}${speed.toFixed(2)}%</div></div>
        <div class="metric"><div class="metric-label">委比</div><div class="metric-value ${bidRatio>=0?'up':'down'}">${bidRatio>=0?'+':''}${bidRatio.toFixed(2)}%</div></div>
      </div>
      <div class="stock-actions">
        <button class="btn ${inWatchlist?'btn-outline':'btn-primary'}" onclick="toggleWatchlist('${code}',${mkt},'${name}')">
          ${inWatchlist?'✓ 已加入自选':'+ 加入自选'}
        </button>
        <button class="btn btn-outline" onclick="window.open('${getQuoteUrl(code,mkt)}','_blank')">查看更多 ↗</button>
      </div>
      <div style="margin-top:12px;font-size:11px;color:#5a5d66;text-align:right">数据来源：东方财富 · 每10秒自动刷新</div>
    `;
  } catch(err) {
    if (content.querySelector('.loading')) {
      content.innerHTML = '<div class="error-msg">行情获取失败：' + err.message + '<br>请检查网络连接后重试</div>';
    }
  }
}

// ==================== WATCHLIST ====================
function getWatchlist() {
  try { return JSON.parse(localStorage.getItem('stock_watchlist') || '[]'); } catch(e) { return []; }
}
function saveWatchlist(list) {
  localStorage.setItem('stock_watchlist', JSON.stringify(list));
}
function isWatchlisted(code, mkt) {
  return getWatchlist().some(s => s.code===code && s.mkt===mkt);
}
function toggleWatchlist(code, mkt, name) {
  let list = getWatchlist();
  const idx = list.findIndex(s => s.code===code && s.mkt===mkt);
  if (idx >= 0) list.splice(idx, 1);
  else list.push({code, mkt, name});
  saveWatchlist(list);
  renderWatchlist();
  // Update button
  if (currentStock && currentStock.code===code) {
    fetchStockQuoteRaw(code, mkt, name);
  }
}
function removeFromWatchlist(code, mkt) {
  let list = getWatchlist();
  list = list.filter(s => !(s.code===code && s.mkt===mkt));
  saveWatchlist(list);
  renderWatchlist();
}
function renderWatchlist() {
  const el = document.getElementById('watchlist');
  const list = getWatchlist();
  if (list.length === 0) {
    el.innerHTML = '<div class="watchlist-empty">暂无自选股票，搜索并添加后会显示在这里</div>';
    return;
  }
  el.innerHTML = list.map(s => {
    const mktLabel = s.mkt===1?'SH':s.mkt===0?'SZ':s.mkt===105?'NASDAQ':s.mkt===106?'NYSE':'';
    return `<div class="watchlist-chip" onclick="selectStock('${s.code}',${s.mkt},'${s.name}')">
      <span>${s.name}</span>
      <span style="color:#787b86;font-size:11px">${s.code}</span>
      <span class="remove" onclick="event.stopPropagation();removeFromWatchlist('${s.code}',${s.mkt})">×</span>
    </div>`;
  }).join('');
}

  const now = new Date();
  const pad = n => n.toString().padStart(2,'0');
  document.getElementById('clockText').textContent =
    now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
}

updateClock();

// ==================== GLOBAL REFRESH ====================
async function refreshAllData() {
  const btn = document.getElementById('refreshAllBtn');
  if (btn.classList.contains('spinning')) return; // Prevent double-click
  btn.classList.add('spinning');

  const tasks = [];

  // 1. Refresh news - re-render current region
  const activeRegionTab = document.querySelector('#regionTabs .region-tab.active');
  if (activeRegionTab) {
    renderNews(activeRegionTab.dataset.region);
  }

  // 2. Refresh indices
  if (indexDataLoaded) {
    tasks.push(refreshIndices());
  }

  // 3. Refresh stock quote
  if (currentStock) {
    tasks.push(fetchStockQuoteRaw(currentStock.code, currentStock.mkt, currentStock.name));
  }

  // Wait for async tasks
  await Promise.allSettled(tasks);

  // Show feedback
  const originalHTML = btn.innerHTML;
  btn.innerHTML = '<span class="refresh-icon">✓</span>已刷新';
  btn.style.color = '#26a69a';
  btn.style.borderColor = '#26a69a';
  setTimeout(() => {
    btn.classList.remove('spinning');
    btn.innerHTML = originalHTML;
    btn.style.color = '';
    btn.style.borderColor = '';
  }, 1500);
}

document.getElementById('refreshAllBtn').addEventListener('click', refreshAllData);

let indexDataCache = {};
let indexDataLoaded = false;
let currentIndexFilter = 'all';
let indexRefreshInt = null;

// Batch fetch all index quotes via ulist API (single request)
async function fetchAllIndexQuotes() {
  const allSecids = INDEX_LIST.map(i => i.secid).join(',');
  const url = API_HTTP + '://push2.eastmoney.com/api/qt/ulist.np/get?fields=f1,f2,f3,f4,f5,f6,f12,f14,f15,f16,f17,f18&secids=' + allSecids;

  try {
    const data = await fetchWithProxy(url);
    if (data && data.data && data.data.diff) return data.data.diff;
    return [];
  } catch(e) {
    return [];
  }
}

function parseIndexData(item) {
  // f1=2 -> stock/index type, precision /100
  // f1=4 -> forex type, precision /10000
  const isForex = (item.f1 === 4);
  const div = isForex ? 10000 : 100;
  return {
    name: item.f14,
    price: (item.f2 || 0) / div,
    change: (item.f4 || 0) / div,
    changePct: (item.f3 || 0) / 100,
    high: (item.f15 || 0) / div,
    low: (item.f16 || 0) / div,
    open: (item.f17 || 0) / div,
    prevClose: (item.f18 || 0) / div,
    amplitude: 0
  };
}

async function loadAllIndices() {
  indexDataLoaded = true;
  const overview = document.getElementById('indexOverview');
  overview.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px">正在加载全球指数实时行情...</p></div>';

  const diff = await fetchAllIndexQuotes();
  // Build a lookup by code (f12)
  const lookup = {};
  diff.forEach(item => { lookup[item.f12] = item; });

  // Map back to INDEX_LIST using secid's code part
  INDEX_LIST.forEach(idx => {
    const codePart = idx.secid.split('.')[1];
    const item = lookup[codePart];
    if (item) {
      const parsed = parseIndexData(item);
      if (parsed.high && parsed.low && parsed.prevClose) {
        parsed.amplitude = parsed.prevClose > 0 ? ((parsed.high - parsed.low) / parsed.prevClose * 100) : 0;
      }
      indexDataCache[idx.secid] = parsed;
    }
  });

  renderIndexOverview();
  renderIndexGroups();

  // Auto refresh every 15s
  if (indexRefreshInt) clearInterval(indexRefreshInt);
  indexRefreshInt = setInterval(refreshIndices, 15000);
}

async function refreshIndices() {
  const diff = await fetchAllIndexQuotes();
  const lookup = {};
  diff.forEach(item => { lookup[item.f12] = item; });

  INDEX_LIST.forEach(idx => {
    const codePart = idx.secid.split('.')[1];
    const item = lookup[codePart];
    if (item) {
      const parsed = parseIndexData(item);
      if (parsed.high && parsed.low && parsed.prevClose) {
        parsed.amplitude = parsed.prevClose > 0 ? ((parsed.high - parsed.low) / parsed.prevClose * 100) : 0;
      }
      indexDataCache[idx.secid] = parsed;
    }
  });

  renderIndexOverview();
  renderIndexGroups();
  // If detail open, refresh it
  const detail = document.getElementById('indexDetail');
  if (detail.classList.contains('show') && detail.dataset.secid) {
    renderIndexDetail(detail.dataset.secid);
  }
}

const REGION_LABELS = { china:'中国', us:'美国', asia:'亚洲', europe:'欧洲', global:'全球宏观' };

function renderIndexOverview() {
  const el = document.getElementById('indexOverview');
  let list = INDEX_LIST;
  if (currentIndexFilter !== 'all') list = list.filter(i => i.region === currentIndexFilter);

  el.innerHTML = list.map(idx => {
    const q = indexDataCache[idx.secid];
    if (!q) return `<div class="index-card region-${idx.region}"><div class="idx-name">${idx.name}</div><div class="idx-price" style="color:#5a5d66">--</div></div>`;
    const up = q.change >= 0;
    const riskLabel = idx.risk === 'high' ? '高风险' : idx.risk === 'medium' ? '中风险' : '低风险';
    const riskCls = idx.risk;
    return `<div class="index-card region-${idx.region}" onclick="showIndexDetail('${idx.secid}')">
      <div class="idx-name">${q.name || idx.name}</div>
      <div class="idx-price">${q.price.toFixed(2)}</div>
      <div class="idx-change ${up?'up':'down'}">${up?'+':''}${q.change.toFixed(2)} (${up?'+':''}${q.changePct.toFixed(2)}%)</div>
      <div class="idx-meta">
        <span>振幅 ${q.amplitude.toFixed(2)}%</span>
        <span class="idx-risk ${riskCls}">${riskLabel}</span>
      </div>
    </div>`;
  }).join('');
}

function renderIndexGroups() {
  const el = document.getElementById('indexGroups');
  const regions = currentIndexFilter === 'all' ? ['china','us','asia','europe','global'] : [currentIndexFilter];
  el.innerHTML = regions.map(reg => {
    const indices = INDEX_LIST.filter(i => i.region === reg);
    return `<div class="region-group">
      <h3><span class="rg-dot ${reg}"></span>${REGION_LABELS[reg]}区域指数<span class="rg-count">(${indices.length}个)</span></h3>
      <div class="index-overview" style="margin-bottom:0">
        ${indices.map(idx => {
          const q = indexDataCache[idx.secid];
          if (!q) return '';
          const up = q.change >= 0;
          const riskLabel = idx.risk === 'high' ? '高风险' : idx.risk === 'medium' ? '中风险' : '低风险';
          return `<div class="index-card region-${idx.region}" onclick="showIndexDetail('${idx.secid}')">
            <div class="idx-name">${q.name || idx.name}</div>
            <div class="idx-price">${q.price.toFixed(2)}</div>
            <div class="idx-change ${up?'up':'down'}">${up?'+':''}${q.change.toFixed(2)} (${up?'+':''}${q.changePct.toFixed(2)}%)</div>
            <div class="idx-meta"><span>振幅 ${q.amplitude.toFixed(2)}%</span><span class="idx-risk ${idx.risk}">${riskLabel}</span></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function showIndexDetail(secid) {
  const detail = document.getElementById('indexDetail');
  detail.classList.add('show');
  detail.dataset.secid = secid;
  renderIndexDetail(secid);
  detail.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function renderIndexDetail(secid) {
  const idx = INDEX_LIST.find(i => i.secid === secid);
  if (!idx) return;
  const q = indexDataCache[secid];
  const content = document.getElementById('indexDetailContent');
  if (!q) {
    content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    return;
  }
  const up = q.change >= 0;
  const riskLabel = idx.risk === 'high' ? '高风险' : idx.risk === 'medium' ? '中风险' : '低风险';
  const riskCls = idx.risk;
  const posChips = (idx.posFactors||[]).map(f => `<span class="factor-chip pos">${f}</span>`).join('');
  const negChips = (idx.negFactors||[]).map(f => `<span class="factor-chip neg">${f}</span>`).join('');

  content.innerHTML = `
    <div class="index-detail-header">
      <div>
        <div class="index-detail-name">${q.name || idx.name}</div>
        <div class="index-detail-code">${REGION_LABELS[idx.region]}区域 · ${idx.secid} · ${riskLabel}</div>
      </div>
      <div class="index-detail-price-block">
        <div class="index-detail-price ${up?'up':'down'}">${q.price.toFixed(2)}</div>
        <div class="index-detail-change ${up?'up':'down'}">${up?'+':''}${q.change.toFixed(2)} (${up?'+':''}${q.changePct.toFixed(2)}%)</div>
      </div>
    </div>
    <div class="index-metrics-row">
      <div class="metric"><div class="metric-label">今开</div><div class="metric-value">${q.open.toFixed(2)}</div></div>
      <div class="metric"><div class="metric-label">最高</div><div class="metric-value up">${q.high.toFixed(2)}</div></div>
      <div class="metric"><div class="metric-label">最低</div><div class="metric-value down">${q.low.toFixed(2)}</div></div>
      <div class="metric"><div class="metric-label">昨收</div><div class="metric-value">${q.prevClose.toFixed(2)}</div></div>
      <div class="metric"><div class="metric-label">振幅</div><div class="metric-value">${q.amplitude.toFixed(2)}%</div></div>
    </div>
    <div class="index-analysis-box">
      <h4>新闻风险影响分析 <span class="risk-tag ${riskCls}">${riskLabel}</span></h4>
      <p>${idx.analysis}</p>
      <div class="factors">
        ${posChips}
        ${negChips}
      </div>
    </div>
    <div style="margin-top:12px;font-size:11px;color:#5a5d66;text-align:right">数据来源：东方财富 · 每15秒自动刷新</div>
  `;
}

// Index region filter
document.getElementById('indexRegionTabs').addEventListener('click', e => {
  const tab = e.target.closest('.region-tab');
  if (!tab) return;
  document.querySelectorAll('#indexRegionTabs .region-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentIndexFilter = tab.dataset.iregion;
  renderIndexOverview();
  renderIndexGroups();
});
